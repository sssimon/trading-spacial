server {
    listen 80;
    server_name localhost;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Archivos estáticos de React
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        # SPA: redirige todas las rutas al index.html
        try_files $uri $uri/ /index.html;

        # Sin caché para el HTML (para que siempre cargue la versión más nueva)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Assets con hash → caché agresivo
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy inverso hacia la API (btc_api.py en el host)
    # host.docker.internal resuelve al host en Docker Desktop (Windows/Mac)
    location /api/ {
        proxy_pass         http://host.docker.internal:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
